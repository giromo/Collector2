name: Collector2

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Create directories
      run: mkdir -p logs bulk

    - name: Set up PHP
      uses: shivammathur/setup-php@v3
      with:
        php-version: '8.2' 

    - name: Run PHP processor
      run: php Files/vmess_processor.php > logs/php_run.log 2>&1 || echo "PHP processor failed"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'      
        cache: true
        cache-dependency-path: Files/go.mod

    - name: Install Go dependencies
      working-directory: ./Files
      run: go mod tidy && go mod download

    - name: Build and run Golang file
      working-directory: ./Files
      run: go run ./main.go > ../logs/go_run.log 2>&1 || (cat ../logs/go_run.log && exit 1)

    - name: Upload log file
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: go-run-log
        path: logs/go_run.log
        retention-days: 7

    - name: Move Files to Bulk Directory
      run: |
        mkdir -p bulk
        mv Files/*.txt bulk/ 2>/dev/null || true

    - name: Create merge files
      run: |
        cd bulk
        
        # merge1
        cat ss_iran.txt trojan_iran.txt > merge1.txt 2>/dev/null || true
        sed -i '/^\(ss:\/\/\|shadowsocks:\/\/\|trojan:\/\/\)/!d' merge1.txt
        
        # merge2
        cat vmess_iran.txt vless_iran.txt > merge2.txt 2>/dev/null || true
        sed -i '/^\(vmess:\/\/\|vless:\/\/\)/!d' merge2.txt
        
        # merge3
        cat vmess_iran.txt vless_iran.txt ss_iran.txt trojan_iran.txt tuic_iran.txt hysteria2_iran.txt wireguard_iran.txt > merge3.txt 2>/dev/null || true
        sed -i '/^\(ss:\/\/\|shadowsocks:\/\/\|trojan:\/\/\|vmess:\/\/\|vless:\/\/\|tuic:\/\/\|hy2:\/\/\|hysteria2:\/\/\|wireguard:\/\/\)/!d' merge3.txt

    - name: Convert to base64
      run: |
        cd bulk
        [ -f merge1.txt ] && base64 merge1.txt > b64_merge1.txt || true
        [ -f merge2.txt ] && base64 merge2.txt > b64_merge2.txt || true
        [ -f merge3.txt ] && base64 merge3.txt > b64_merge3.txt || true

    - name: Commit and Push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        git add ./bulk/ ./logs/ || true
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔲 $(date '+%Y-%m-%d %H:%M:%S') Collected"
          git pull origin main --rebase
          git push origin main
        fi

    - name: Clean up logs
      if: always()
      run: rm -rf logs
